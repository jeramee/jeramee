name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          user: jeramee
          token: ${{ secrets.GITHUB_TOKEN }}

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used